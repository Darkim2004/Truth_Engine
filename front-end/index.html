<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUTH SHIELD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f1a;
            color: white;
        }

        .glass {
            background: rgba(22, 27, 44, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: visible;
        }

        .title-container {
            overflow: visible;
        }

        .tab-active {
            background-color: #4f46e5;
            color: white;
        }

        #gaugeArcoProgress {
            transition: stroke-dashoffset 2s ease-in-out;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full glass rounded-[3rem] p-10 border border-slate-800 text-center">

        <div class="text-center mb-12 title-container">
            <div class="flex items-center justify-center gap-2 mb-2" style="overflow: visible;">
                <h1
                    class="text-5xl font-900 italic uppercase select-none flex items-center justify-center p-4" style="overflow: visible; letter-spacing: 0.01em;">

                    <svg class="w-11 h-11 mr-2 -mt-1 text-blue-400" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2L3 6v6c0 5.52 3.84 11.23 9 12.31 5.16-1.08 9-6.79 9-12.31V6l-9-4zm7 10c0 4.63-3.08 9.38-7 10.32-3.92-.94-7-5.69-7-10.32V7.18l7-3.11 7 3.11V12z" />
                        <path d="M12 4.3l-5 2.22V12c0 3.75 2.5 7.6 5 8.35 2.5-.75 5-4.6 5-8.35V6.52l-5-2.22z"
                            opacity=".5" />
                    </svg>

                    <span class="bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent" style="padding-right: 0.15em;">
                        Truth Shield
                    </span>
                </h1>
            </div>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold mt-2">Fact-Checking Intelligente
            </p>
        </div>

        <div class="flex justify-center mb-8">
            <div class="bg-slate-900 p-1 rounded-2xl border border-slate-800 flex gap-1">
                <button id="tabTesto" onclick="switchMode('testo')"
                    class="px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest tab-active transition-all">Scrivi
                    News</button>
                <button id="tabUrl" onclick="switchMode('url')"
                    class="px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 transition-all">Analizza
                    URL</button>
            </div>
        </div>

        <div class="space-y-6">
            <div id="containerTesto">
                <textarea id="testoInput" rows="4"
                    class="w-full bg-[#070a13] border border-slate-700 rounded-3xl p-6 text-sm outline-none focus:ring-2 focus:ring-indigo-500 text-white"
                    placeholder="Incolla il testo..."></textarea>
            </div>
            <div id="containerUrl" class="hidden">
                <input type="url" id="urlInput"
                    class="w-full bg-[#070a13] border border-slate-700 rounded-3xl p-6 text-sm outline-none focus:ring-2 focus:ring-indigo-500 text-white"
                    placeholder="https://...">
            </div>
            <button id="inviaBtn" onclick="processData()"
                class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-indigo-500 active:scale-95 transition-all flex justify-center items-center gap-3 uppercase group">
                <span id="btnLabel" class="tracking-tight">AVVIA SCANSIONE</span>
                <div id="loader"
                    class="hidden w-5 h-5 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>

                <svg class="w-5 h-5 opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                </svg>
            </button>
        </div>

        <div id="resultContainer" class="mt-12 hidden">
            <div class="bg-[#070a13]/60 py-10 rounded-[2.5rem] border border-slate-800 mb-8 relative">
                <svg viewBox="0 0 200 120" class="w-64 h-40 mx-auto">
                    <defs>
                        <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#ef4444" />
                            <stop offset="50%" stop-color="#f59e0b" />
                            <stop offset="100%" stop-color="#10b981" />
                        </linearGradient>
                    </defs>
                    <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="#1e293b" stroke-width="12"
                        stroke-linecap="round" />
                    <path id="gaugeArcoProgress" d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="url(#gaugeGradient)"
                        stroke-width="12" stroke-linecap="round" stroke-dasharray="251.32" stroke-dashoffset="251.32" />
                    
                    <!-- Numeri di riferimento (solo cifre) -->
                    <text x="15" y="115" fill="#64748b" font-size="8" font-weight="bold" font-family="Inter">0</text>
                    <text x="100" y="12" fill="#64748b" font-size="8" font-weight="bold" font-family="Inter" text-anchor="middle">50</text>
                    <text x="185" y="115" fill="#64748b" font-size="8" font-weight="bold" font-family="Inter" text-anchor="end">100</text>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-end pb-12">
                    <span id="percentualeTesto" class="text-5xl font-900">0</span>
                </div>
            </div>
            <div class="p-6 rounded-3xl bg-slate-800/40 border border-slate-700">
                <p id="verdettoTesto" class="text-2xl font-black uppercase italic">--</p>
            </div>
            <div id="listaFonti" class="mt-6"></div>

            <button onclick="resetAll()"
                class="w-full mt-10 text-[10px] text-slate-600 uppercase tracking-[0.3em] hover:text-indigo-400 transition-all font-black py-4 border-t border-slate-800/50">
                <span>× Pulisci e Riavvia</span>
            </button>
        </div>

        <div
            class="mt-16 pt-8 border-t border-slate-800 text-[11px] font-black italic text-slate-500 uppercase flex justify-center gap-4">
            <span>Matteo Bianchi</span>•<span>Andrea Cancaglioni</span>•<span>Luigi Romano</span>
        </div>
    </div>
    <script src="config.js?v=2"></script>
    <script src="script.js?v=2"></script>
</body>

</html>
