<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUTH ENGINE | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f1a;
        }

        .glass {
            background: rgba(22, 27, 44, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Animazione fluida per l'arco SVG */
        #gaugeArcoProgress {
            transition: stroke-dashoffset 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Effetto pulsante per il numero finale */
        .number-ready {
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="text-slate-200 min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="max-w-2xl w-full glass rounded-[3rem] shadow-2xl p-8 border border-slate-800">

        <div class="text-center mb-8">
            <h1
                class="text-5xl font-900 bg-gradient-to-r from-orange-500 via-rose-500 to-emerald-500 bg-clip-text text-transparent italic tracking-tighter uppercase">
                Truth Engine
            </h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold mt-2">Analisi Asset Digitali</p>
        </div>

        <div class="space-y-6">
            <textarea id="testoInput" rows="3"
                class="w-full bg-[#070a13] border border-slate-700 rounded-3xl p-5 text-sm focus:ring-2 focus:ring-rose-500 outline-none transition-all placeholder:text-slate-600 resize-none text-white shadow-inner"
                placeholder="Inserisci testo (es. 'test_vero')..."></textarea>

            <button id="inviaBtn" onclick="processData()"
                class="w-full bg-white text-black hover:bg-rose-500 hover:text-white py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                <span id="btnLabel">AVVIA SCANSIONE</span>
                <div id="loader"
                    class="hidden w-6 h-6 border-4 border-black/20 border-t-black rounded-full animate-spin"></div>
            </button>
        </div>

        <div id="resultContainer" class="mt-10 hidden">

            <div
                class="flex flex-col items-center justify-center mb-8 bg-[#070a13]/60 py-10 rounded-[2.5rem] border border-slate-800 relative shadow-2xl">
                <div class="relative w-80 h-44">
                    <svg viewBox="0 0 200 120" class="w-full h-full">
                        <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="#1e293b" stroke-width="12"
                            stroke-linecap="round" />

                        <defs>
                            <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#f43f5e" />
                                <stop offset="50%" stop-color="#fbbf24" />
                                <stop offset="100%" stop-color="#10b981" />
                            </linearGradient>
                        </defs>

                        <path id="gaugeArcoProgress" d="M20,100 A80,80 0 0,1 180,100" fill="none"
                            stroke="url(#gaugeGradient)" stroke-width="12" stroke-linecap="round"
                            stroke-dasharray="251.32" stroke-dashoffset="251.32" />

                        <g class="text-[7px] fill-slate-600 font-black italic">
                            <text x="10" y="115">0</text>
                            <text x="18" y="75">20</text>
                            <text x="60" y="35">40</text>
                            <text x="130" y="35">60</text>
                            <text x="172" y="75">80</text>
                            <text x="180" y="115">100</text>
                        </g>
                    </svg>

                    <div class="absolute inset-0 flex flex-col items-center justify-end pb-4">
                        <span id="percentualeTesto"
                            class="text-6xl font-900 text-white tracking-tighter opacity-0">0%</span>
                        <p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 font-black mb-1">Affidabilità</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="p-5 rounded-3xl bg-slate-800/40 border border-slate-700 shadow-lg">
                    <p class="text-[10px] uppercase font-bold text-slate-500 mb-2 tracking-widest">Verdetto Finale</p>
                    <p id="verdettoTesto" class="text-2xl font-black italic uppercase tracking-tight">--</p>
                </div>

                <div id="listaFonti" class="space-y-4">
                </div>
            </div>

            <button onclick="location.reload()"
                class="w-full mt-8 text-[10px] text-slate-600 uppercase tracking-widest hover:text-rose-500 transition-colors font-bold">
                Pulisci e Riavvia
            </button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
