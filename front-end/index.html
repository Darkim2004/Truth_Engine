<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Truth Engine v2 - Analizzatore</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-slate-800 rounded-3xl p-8 border border-slate-700 shadow-2xl text-center">
        <h1 class="text-3xl font-black mb-6 text-orange-500 uppercase italic">Truth Engine</h1>

        <p class="text-slate-400 mb-6 text-sm">Incolla l'informazione da verificare qui sotto:</p>

        <textarea id="inputMain" rows="8"
            class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-white focus:ring-2 focus:ring-orange-600 outline-none mb-6 transition-all"
            placeholder="Esempio: Il 10% della popolazione mondiale vive in Italia..."></textarea>

        <button id="btnAnalyze" onclick="processData()"
            class="w-full bg-orange-600 hover:bg-orange-500 py-5 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all">
            <span id="btnLabel">VERIFICA L'INFORMAZIONE</span>
        </button>

        <div id="loader" class="hidden mt-4 text-orange-400 text-sm animate-pulse">
            L'AI sta preparando il pacchetto dati per il sistema...
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
